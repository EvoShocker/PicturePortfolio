<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cade — Photography</title>
<meta name="description" content="Travel and landscape photography by Cade. From the Annapurnas to the American West — large expanses, quiet places, and the slow patience of light.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0c0a;
    --bg-elevated: #16140f;
    --ink: #d8d0bb;
    --ink-bright: #f0e9d6;
    --ink-dim: #7a7363;
    --ink-faint: #2e2b24;
    --copper: #a86840;
    --copper-deep: #6e3f23;
    --border: #211f1a;
    --max-width: 1600px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    line-height: 1.5;
    font-size: 18px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--copper); color: var(--bg); }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  }

  .mono {
    font-family: 'Special Elite', 'Courier New', monospace;
    letter-spacing: 0.04em;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 1.5rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(14px);
    background: rgba(13, 12, 10, 0.55);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
    color: var(--ink-bright);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .logo-mark {
    width: 26px; height: 26px;
    border: 1px solid var(--copper);
    border-radius: 50%;
    position: relative;
    display: inline-block;
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 6px;
    background: var(--copper);
    border-radius: 50%;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  .nav-links a {
    color: var(--ink-dim);
    text-decoration: none;
    transition: color 0.4s ease;
    position: relative;
  }

  .nav-links a:hover { color: var(--ink-bright); }

  .nav-links a::after {
    content: '';
    position: absolute;
    left: 50%; bottom: -5px;
    width: 0; height: 1px;
    background: var(--copper);
    transition: width 0.4s ease, left 0.4s ease;
  }

  .nav-links a:hover::after { width: 100%; left: 0; }

  .hero {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 6rem 2.5rem 4rem;
  }

  .hero-image {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.55) saturate(0.9);
    animation: kenBurns 28s ease-out infinite alternate;
  }

  @keyframes kenBurns {
    from { transform: scale(1.0); }
    to { transform: scale(1.12); }
  }

  .hero-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(13,12,10,0.4) 0%, transparent 30%, transparent 60%, var(--bg) 100%),
      linear-gradient(90deg, rgba(13,12,10,0.7) 0%, transparent 50%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
    animation: fadeUp 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-meta {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--copper);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .hero-meta::before {
    content: '';
    width: 50px;
    height: 1px;
    background: var(--copper);
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 9vw, 8rem);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 2rem;
    color: var(--ink-bright);
  }

  .hero h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--copper);
  }

  .hero-tagline {
    font-size: 1.3rem;
    color: var(--ink);
    max-width: 540px;
    font-weight: 300;
    line-height: 1.6;
    font-style: italic;
  }

  .hero-attribution {
    margin-top: 2.5rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--ink-dim);
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .hero-attribution span::before {
    content: '·';
    margin-right: 1.5rem;
    color: var(--copper);
  }

  .hero-attribution span:first-child::before { content: ''; margin: 0; }

  .compass {
    position: absolute;
    bottom: 3rem;
    right: 3rem;
    width: 70px;
    height: 70px;
    opacity: 0.4;
    z-index: 2;
    animation: spin 120s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .section-header {
    padding: 8rem 2.5rem 3rem;
    max-width: var(--max-width);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 4rem;
    align-items: end;
    border-top: 1px solid var(--border);
  }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--copper);
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .section-label::before {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--copper);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 5vw, 4.5rem);
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--ink-bright);
  }

  .section-title em { font-style: italic; color: var(--copper); }

  .section-intro {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 2.5rem 2rem;
    font-size: 1.15rem;
    color: var(--ink-dim);
    font-style: italic;
    line-height: 1.7;
  }

  .filter-bar {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 1rem 2.5rem 3rem;
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .filter-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--ink-dim);
  }

  .filter-btn {
    background: none;
    border: none;
    color: var(--ink-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    cursor: pointer;
    padding: 0.25rem 0;
    transition: color 0.4s ease;
    position: relative;
  }

  .filter-btn::after {
    content: '';
    position: absolute;
    left: 0; bottom: -4px;
    width: 0; height: 1px;
    background: var(--copper);
    transition: width 0.4s ease;
  }

  .filter-btn:hover, .filter-btn.active { color: var(--ink-bright); }
  .filter-btn.active::after { width: 100%; }

  .filter-count {
    color: var(--ink-faint);
    margin-left: 0.3rem;
    font-size: 0.7rem;
    font-style: normal;
    font-family: 'Special Elite', monospace;
  }

  .gallery {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 4rem 2.5rem 6rem;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.75rem;
    grid-auto-flow: dense;
  }

  .photo {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: var(--bg-elevated);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease, transform 1s ease;
  }

  .photo.visible { opacity: 1; transform: translateY(0); }

  .photo.size-hero { grid-column: span 8; aspect-ratio: 16/10; }
  .photo.size-large { grid-column: span 6; aspect-ratio: 4/5; }
  .photo.size-medium { grid-column: span 4; aspect-ratio: 4/5; }
  .photo.size-wide { grid-column: span 8; aspect-ratio: 16/9; }
  .photo.size-tall { grid-column: span 4; aspect-ratio: 3/4; }
  .photo.size-square { grid-column: span 4; aspect-ratio: 1/1; }
  .photo.size-portrait { grid-column: span 4; aspect-ratio: 2/3; }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 1.6s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.8s ease;
    filter: brightness(0.92) saturate(0.95);
  }

  .photo:hover img {
    transform: scale(1.05);
    filter: brightness(1) saturate(1);
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: linear-gradient(180deg, transparent 40%, rgba(13,12,10,0.85) 100%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .photo:hover .photo-overlay { opacity: 1; }

  .photo-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--ink-bright);
    margin-bottom: 0.4rem;
    line-height: 1.1;
  }

  .photo-meta {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .photo-print-badge {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-bright);
    background: var(--copper-deep);
    padding: 0.4rem 0.7rem;
    position: absolute;
    top: 1rem;
    right: 1rem;
    z-index: 2;
    border: 1px solid var(--copper);
  }

  .photo::before, .photo::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border: 1px solid var(--copper);
    z-index: 3;
    opacity: 0;
    transition: opacity 0.5s ease 0.1s;
    pointer-events: none;
  }

  .photo::before {
    top: 12px; left: 12px;
    border-right: none; border-bottom: none;
  }

  .photo::after {
    bottom: 12px; right: 12px;
    border-left: none; border-top: none;
  }

  .photo:hover::before, .photo:hover::after { opacity: 0.7; }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(8, 7, 5, 0.97);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    backdrop-filter: blur(24px);
  }

  .lightbox.active {
    display: flex;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lightbox-content {
    max-width: 95vw;
    max-height: 90vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    animation: fadeUp 0.6s ease;
  }

  .lightbox img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }

  .lightbox-info {
    text-align: center;
    max-width: 640px;
  }

  .lightbox-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-style: italic;
    color: var(--ink-bright);
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }

  .lightbox-meta {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--copper);
    margin-bottom: 1.5rem;
  }

  .lightbox-caption {
    font-size: 1.05rem;
    color: var(--ink);
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 1.5rem;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
  }

  .lightbox-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    padding: 1rem 2rem;
    border: 1px solid var(--ink-faint);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.4s ease;
    text-decoration: none;
    display: inline-block;
  }

  .btn:hover {
    border-color: var(--copper);
    color: var(--copper);
    background: rgba(168, 104, 64, 0.05);
  }

  .btn-primary {
    background: var(--copper-deep);
    color: var(--ink-bright);
    border-color: var(--copper);
  }

  .btn-primary:hover {
    background: var(--copper);
    color: var(--bg);
  }

  .lightbox-close {
    position: fixed;
    top: 2rem;
    right: 2rem;
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink);
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: 200;
    line-height: 1;
    font-size: 1.5rem;
    transition: all 0.3s ease;
    z-index: 201;
  }

  .lightbox-close:hover {
    border-color: var(--copper);
    color: var(--copper);
  }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink);
    width: 50px; height: 50px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    z-index: 201;
  }

  .lightbox-nav:hover { border-color: var(--copper); color: var(--copper); }
  .lightbox-prev { left: 2rem; }
  .lightbox-next { right: 2rem; }

  .series {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 8rem 2.5rem 4rem;
    border-top: 1px solid var(--border);
  }

  .series-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 4rem;
  }

  .series-card {
    position: relative;
    aspect-ratio: 4/5;
    overflow: hidden;
    cursor: pointer;
    background: var(--bg-elevated);
  }

  .series-card-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.5) saturate(0.85);
    transition: all 0.8s ease;
  }

  .series-card:hover .series-card-img {
    filter: brightness(0.7) saturate(1);
    transform: scale(1.05);
  }

  .series-card-content {
    position: absolute;
    inset: 0;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  .series-card-num {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--copper);
  }

  .series-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-style: italic;
    color: var(--ink-bright);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .series-card-meta {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
  }

  .series-card-coming {
    font-style: italic;
    color: var(--copper);
    font-size: 0.85rem;
    font-family: 'Cormorant Garamond', serif;
    margin-top: 0.5rem;
  }

  .about {
    padding: 10rem 2.5rem 8rem;
    max-width: var(--max-width);
    margin: 0 auto;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 5rem;
  }

  .about-text {
    font-size: 1.5rem;
    font-weight: 300;
    line-height: 1.55;
    letter-spacing: -0.005em;
    color: var(--ink);
  }

  .about-text em { color: var(--copper); font-style: italic; }
  .about-text + .about-text { margin-top: 1.5rem; }

  .about-cta {
    margin-top: 3rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 4rem 2.5rem;
    max-width: var(--max-width);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }

  .footer-col h4 {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--copper);
    margin-bottom: 1.2rem;
    font-weight: 400;
  }

  .footer-col p, .footer-col a {
    font-size: 0.95rem;
    color: var(--ink-dim);
    text-decoration: none;
    line-height: 1.8;
    display: block;
    transition: color 0.3s ease;
  }

  .footer-col a:hover { color: var(--copper); }

  .footer-bottom {
    grid-column: 1 / -1;
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: var(--ink-dim);
    font-style: italic;
    font-size: 1.1rem;
  }

  @media (max-width: 900px) {
    body { font-size: 16px; }
    nav { padding: 1rem 1.25rem; }
    .nav-links { gap: 1.25rem; font-size: 0.6rem; }
    .hero, .section-header, .filter-bar, .gallery, .about, .series, footer, .section-intro {
      padding-left: 1.25rem;
      padding-right: 1.25rem;
    }
    .section-header, .about, footer {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .gallery { gap: 1rem; }
    .photo.size-hero, .photo.size-large, .photo.size-wide,
    .photo.size-medium, .photo.size-tall, .photo.size-square,
    .photo.size-portrait {
      grid-column: span 12;
      aspect-ratio: 4/5;
    }
    .compass { display: none; }
    .lightbox-nav { width: 40px; height: 40px; }
    .lightbox-prev { left: 0.5rem; }
    .lightbox-next { right: 0.5rem; }
    .lightbox { padding: 1rem; }
  }
</style>
</head>
<body>

<div id="app" class="loading">Loading…</div>

<script>
// =====================================================
// This file loads all photos and text from photos.json.
// You should not need to edit this file. Edit photos.json instead.
// =====================================================

let DATA = null;
let currentFiltered = [];
let currentLightboxIdx = 0;

async function loadData() {
  try {
    const response = await fetch('photos.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    DATA = await response.json();
    renderSite();
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div style="text-align: center; padding: 2rem;">
        <p style="color: #a86840; margin-bottom: 1rem;">Could not load photos.json</p>
        <p style="font-size: 0.9rem;">If you're opening this file directly (file://), the browser blocks loading JSON files for security. Either deploy to a host, or run a local server. See README.md.</p>
        <p style="font-size: 0.8rem; margin-top: 1rem; color: #7a7363;">Error: ${err.message}</p>
      </div>
    `;
  }
}

function renderSite() {
  const text = DATA.siteText;
  const heroPhoto = DATA.photos.find(p => p.featured) || DATA.photos[0];

  document.getElementById('app').outerHTML = `
    <nav>
      <div class="logo"><span class="logo-mark"></span>Cade</div>
      <ul class="nav-links mono">
        <li><a href="#work">Work</a></li>
        <li><a href="#series">Series</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#prints">Prints</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <section class="hero">
      <div class="hero-image" style="background-image: url('${heroPhoto.src}')"></div>
      <div class="hero-content">
        <div class="hero-meta mono">${text.heroMeta}</div>
        <h1>${text.heroHeadline}</h1>
        <p class="hero-tagline">${text.heroTagline}</p>
        <div class="hero-attribution mono">
          <span>Travel</span>
          <span>Landscape</span>
          <span>Limited Prints</span>
        </div>
      </div>
      <svg class="compass" viewBox="0 0 100 100" fill="none" stroke="#a86840" stroke-width="0.5">
        <circle cx="50" cy="50" r="48"/>
        <circle cx="50" cy="50" r="36"/>
        <circle cx="50" cy="50" r="2" fill="#a86840"/>
        <path d="M50 4 L46 50 L50 96 L54 50 Z" fill="#a86840" opacity="0.6"/>
        <path d="M4 50 L50 46 L96 50 L50 54 Z" fill="#a86840" opacity="0.3"/>
        <text x="50" y="14" text-anchor="middle" font-size="8" font-family="serif" fill="#a86840">N</text>
      </svg>
    </section>

    <section id="work">
      <div class="section-header">
        <div class="section-label mono">— Selected Work</div>
        <div><h2 class="section-title">Frames from the <em>field.</em></h2></div>
      </div>
      <p class="section-intro">${text.workIntro}</p>
      <div class="filter-bar">
        <span class="filter-label mono">Filter —</span>
        <div id="filterBar" style="display: contents;"></div>
      </div>
      <div class="gallery" id="gallery"></div>
    </section>

    <section id="series" class="series">
      <div class="section-header" style="border: none; padding: 0 0 3rem;">
        <div class="section-label mono">— Projects</div>
        <div><h2 class="section-title">Long-form <em>series.</em></h2></div>
      </div>
      <p style="max-width: 600px; font-size: 1.1rem; color: var(--ink-dim); font-style: italic; line-height: 1.7;">
        ${text.seriesIntro}
      </p>
      <div class="series-grid" id="seriesGrid"></div>
    </section>

    <section id="about" class="about">
      <div class="section-label mono">— About</div>
      <div>
        <p class="about-text">${text.aboutLine1}</p>
        <p class="about-text">${text.aboutLine2}</p>
        <p class="about-text" style="margin-top: 2rem; font-size: 1.1rem; color: var(--ink-dim);">${text.aboutLine3}</p>
        <div class="about-cta">
          <a href="#prints" class="btn btn-primary">Shop Prints</a>
          <a href="#contact" class="btn">Get in Touch</a>
        </div>
      </div>
    </section>

    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightboxClose">×</button>
      <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
      <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
      <div class="lightbox-content">
        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-info">
          <div class="lightbox-title" id="lightboxTitle"></div>
          <div class="lightbox-meta mono" id="lightboxMeta"></div>
          <p class="lightbox-caption" id="lightboxCaption"></p>
          <div class="lightbox-actions" id="lightboxActions"></div>
        </div>
      </div>
    </div>

    <footer id="contact">
      <div class="footer-col">
        <h4 class="mono">Studio</h4>
        <p>Travel & landscape photography</p>
        <p>Available worldwide</p>
      </div>
      <div class="footer-col">
        <h4 class="mono">Inquire</h4>
        <a href="mailto:${text.contactEmail}">${text.contactEmail}</a>
        <a href="#prints">Print sales</a>
        <a href="mailto:${text.contactEmail}?subject=Licensing Inquiry">Image licensing</a>
      </div>
      <div class="footer-col">
        <h4 class="mono">Elsewhere</h4>
        <a href="${text.instagramUrl}" target="_blank">Instagram</a>
        <a href="#">Newsletter</a>
        <a href="#">500px</a>
      </div>
      <div class="footer-bottom mono">
        <span>${text.copyright}</span>
        <span>All images are copyrighted</span>
      </div>
    </footer>
  `;

  buildFilters();
  renderGallery();
  renderSeries();
  attachLightbox();
}

function buildFilters() {
  const categories = ['all', ...new Set(DATA.photos.map(p => p.category))];
  const filterBar = document.getElementById('filterBar');
  filterBar.innerHTML = categories.map(cat => {
    const count = cat === 'all' ? DATA.photos.length : DATA.photos.filter(p => p.category === cat).length;
    const label = DATA.categoryLabels[cat] || (cat.charAt(0).toUpperCase() + cat.slice(1));
    return `<button class="filter-btn ${cat === 'all' ? 'active' : ''}" data-cat="${cat}">${label}<span class="filter-count mono">${String(count).padStart(2, '0')}</span></button>`;
  }).join('');
  filterBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(btn.dataset.cat);
  });
}

function renderGallery(filter = 'all') {
  currentFiltered = filter === 'all' ? DATA.photos : DATA.photos.filter(p => p.category === filter);
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = currentFiltered.map((p, i) => {
    const idx = DATA.photos.indexOf(p);
    return `
      <figure class="photo size-${p.size}" data-index="${idx}" style="transition-delay: ${i * 50}ms">
        ${p.featured ? '<span class="photo-print-badge mono">Print Available</span>' : ''}
        <img src="${p.src}" alt="${p.title || 'Untitled'}, ${p.location}" loading="lazy">
        <div class="photo-overlay">
          ${p.title ? `<div class="photo-title">${p.title}</div>` : ''}
          <div class="photo-meta">
            <span>${p.location}</span>
            <span class="mono">${p.year}</span>
          </div>
        </div>
      </figure>
    `;
  }).join('');

  requestAnimationFrame(() => {
    document.querySelectorAll('.photo').forEach(el => {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1 });
      obs.observe(el);
    });
  });
}

function renderSeries() {
  document.getElementById('seriesGrid').innerHTML = DATA.series.map(s => `
    <div class="series-card" ${s.url ? `onclick="window.location.href='${s.url}'"` : ''}>
      <div class="series-card-img" style="background-image: url(${s.coverImg})"></div>
      <div class="series-card-content">
        <div><div class="series-card-num mono">Series ${s.number}</div></div>
        <div>
          <div class="series-card-title">${s.title}</div>
          <div class="series-card-meta mono">${s.subtitle}</div>
          ${s.comingSoon ? '<div class="series-card-coming">Coming soon</div>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function attachLightbox() {
  const lightbox = document.getElementById('lightbox');
  document.getElementById('gallery').addEventListener('click', (e) => {
    const photoEl = e.target.closest('.photo');
    if (!photoEl) return;
    openLightbox(parseInt(photoEl.dataset.index));
  });
  document.getElementById('lightboxPrev').addEventListener('click', () => navigateLightbox(-1));
  document.getElementById('lightboxNext').addEventListener('click', () => navigateLightbox(1));
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigateLightbox(-1);
    if (e.key === 'ArrowRight') navigateLightbox(1);
  });
}

function openLightbox(photoIdx) {
  const photo = DATA.photos[photoIdx];
  const text = DATA.siteText;
  currentLightboxIdx = currentFiltered.indexOf(photo);

  document.getElementById('lightboxImg').src = photo.src;
  document.getElementById('lightboxImg').alt = photo.title || 'Untitled';

  const titleEl = document.getElementById('lightboxTitle');
  if (photo.title) {
    titleEl.textContent = photo.title;
    titleEl.style.display = '';
  } else {
    titleEl.style.display = 'none';
  }

  document.getElementById('lightboxMeta').textContent = `${photo.location} · ${photo.year}`;

  const captionEl = document.getElementById('lightboxCaption');
  if (photo.caption) {
    captionEl.textContent = photo.caption;
    captionEl.style.display = '';
  } else {
    captionEl.style.display = 'none';
  }

  document.getElementById('lightboxActions').innerHTML = photo.printUrl
    ? `<a href="${photo.printUrl}" class="btn btn-primary">Order a Print</a><a href="mailto:${text.contactEmail}?subject=License: ${encodeURIComponent(photo.title || 'Untitled')}" class="btn">License Image</a>`
    : `<a href="mailto:${text.contactEmail}?subject=Inquiry: ${encodeURIComponent(photo.title || 'Untitled')}" class="btn">Inquire</a>`;

  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function navigateLightbox(direction) {
  currentLightboxIdx = (currentLightboxIdx + direction + currentFiltered.length) % currentFiltered.length;
  const photo = currentFiltered[currentLightboxIdx];
  openLightbox(DATA.photos.indexOf(photo));
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

loadData();
</script>

</body>
